<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Analyse Pro - EduBehavior</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
}
</style>

</head>

<body>

<div class="container mt-4">

<h1 class="text-center text-primary">📊 Analyse Avancée</h1>

<div class="text-center mb-4">
    <a href="/dashboard" class="btn btn-primary">Dashboard</a>
    <a href="/" class="btn btn-secondary">Accueil</a>
</div>

<!-- STATISTIQUES -->
<div class="card mb-4">
<h5>Statistiques avancées</h5>

<p>Moyenne : {{moyenne}}</p>
<p>Ecart-type : {{ecart}}</p>
<p>Q1 : {{q1}}</p>
<p>Médiane : {{q2}}</p>
<p>Q3 : {{q3}}</p>
<p>Régression : y = {{pente}}x + {{intercept}}</p>
</div>

<div class="row g-4">

<!-- Histogramme -->
<div class="col-md-6">
<div class="card">
<h5>Histogramme des notes</h5>
<canvas id="hist"></canvas>
</div>
</div>

<!-- Boxplot (simulation) -->
<div class="col-md-6">
<div class="card">
<h5>Boxplot (quartiles)</h5>
<canvas id="box"></canvas>
</div>
</div>

<!-- Regression -->
<div class="col-md-12">
<div class="card">
<h5>Régression linéaire (Heures vs Notes)</h5>
<canvas id="reg"></canvas>
</div>
</div>

</div>

</div>

<script>

// données Flask
let notes = {{notes | tojson}};
let heures = {{heures | tojson}};

// Histogramme
new Chart(document.getElementById("hist"), {
    type: "bar",
    data: {
        labels: notes,
        datasets: [{
            label: "Notes",
            data: notes
        }]
    }
});

// Boxplot simplifié
new Chart(document.getElementById("box"), {
    type: "bar",
    data: {
        labels: ["Q1","Q2","Q3"],
        datasets: [{
            label: "Quartiles",
            data: [{{q1}}, {{q2}}, {{q3}}]
        }]
    }
});

// Régression
let regression = heures.map(x => {{pente}} * x + {{intercept}});

new Chart(document.getElementById("reg"), {
    type: "line",
    data: {
        labels: heures,
        datasets: [
            {
                label: "Données réelles",
                data: notes
            },
            {
                label: "Régression",
                data: regression
            }
        ]
    }
});

</script>

</body>
</html>
